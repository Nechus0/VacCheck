<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccine Drug Checker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Impf-Medikamenten Check</h1>
            <p>Überprüfen Sie die Kompatibilität von Medikamenten mit Lebendimpfungen (z.B. Gelbfieber).</p>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="drugInput" placeholder="Medikament (Wirkstoff oder Handelsname) eingeben..." autocomplete="off">
                <div id="autocomplete-list" class="autocomplete-items"></div>
            </div>
        </section>

        <section class="selected-drugs-section">
            <h2>Ausgewählte Medikamente</h2>
            <div id="selectedDrugsList" class="drugs-list">
                <p class="empty-state">Noch keine Medikamente ausgewählt.</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
