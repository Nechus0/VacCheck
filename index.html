<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VAC Check">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="favicon.ico">
    <title>Vaccine Drug Checker</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <div class="divider"></div>
                <div>
                    <div class="app-title">Impf-Medikamenten Check</div>
                    <div class="app-sub">KOMPATIBILITÄT MIT LEBENDIMPFUNGEN PRÜFEN</div>
                </div>
            </div>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="drugInput" placeholder="Medikament (Wirkstoff oder Handelsname) eingeben..." autocomplete="off">
                <div id="autocomplete-list" class="autocomplete-items"></div>
            </div>
        </section>

        <section class="selected-drugs-section">
            <h2>Ausgewählte Medikamente</h2>
            <div id="selectedDrugsList" class="drugs-list">
                <p class="empty-state">Noch keine Medikamente ausgewählt.</p>
            </div>
        </section>

        <footer>
            <p>Created by Joscha Pocha</p>
        </footer>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
